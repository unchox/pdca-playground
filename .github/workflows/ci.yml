name: ci   # <- must match pdca-act.yml `workflow_run.workflows`

on:
  push:
    branches: ["pdca/**"]   # the loop runs on its own task branches
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-json-report ruff

      # Run each gate; collect the ids of whatever is red into FAILING.
      # ci_report.py turns that into a STABLE failure signature input
      # (sorted check ids), never a hash of raw logs.
      - name: Deterministic gates
        id: gates
        run: |
          set +e
          mkdir -p .pdca
          FAILING=()

          # exit code を file に直接書く (bash array 経由 廃止・IFS bug 完全回避)
          # 2026-06-30 fizzbuzz/multiply で踏破: bash IFS subshell が 非空 array でも
          # "1001" garbage を生成・group 名引き渡し pattern を 廃止 → ci_report.py が
          # exit code file + pytest.json を直読みする

          ruff check . --output-format=concise > ruff.txt 2>&1
          echo $? > .pdca/ruff_exit.txt

          pytest -q --no-header -p no:cacheprovider \
            --json-report --json-report-file=.pdca/pytest.json > pytest.txt 2>&1
          echo $? > .pdca/pytest_exit.txt

          echo "DEBUG: ruff_exit=$(cat .pdca/ruff_exit.txt) pytest_exit=$(cat .pdca/pytest_exit.txt)"
          python .pdca/ci_report.py

      - name: Upload ci_result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci_result
          path: .pdca/ci_result.json
          retention-days: 7
